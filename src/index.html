<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Prathamesh Jewellers</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <app-root>
    <style>
      .preload-splash{position:fixed;inset:0;z-index:99999;background:#fff;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;font-family:'Playfair Display',serif}
      .preload-splash .gem{font-size:3rem;animation:preGem 1.2s ease-in-out infinite}
      .preload-splash span{color:#B76E79;font-size:1.3rem;font-weight:700;letter-spacing:2px}
      @keyframes preGem{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-8px) scale(1.1)}}
    </style>
    <div class="preload-splash">
      <div class="gem">&#x1F48E;</div>
      <span>Prathamesh Jewellers</span>
    </div>
  </app-root>
</body>
</html>
